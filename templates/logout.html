{% if data %}
<script>
    $(document).ready(function() {
        function dismissToast(element) {
            $(element).css({
                'transform': 'translateX(120%)',
                'opacity': '0',
                'transition': 'all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55)'
            });
            setTimeout(function() {
                $(element).remove();
            }, 600);
        }

        setTimeout(function() {
            $('.toast-card').each(function() {
                dismissToast(this);
            });
        }, 4000);

        $('.toast-close').click(function() {
            dismissToast($(this).closest('.toast-card'));
        });
    });

    window.location.href="/login/";
</script>
    
</script>
{% else %}
<script>

window.location.href="/login/";
</script>
{% endif %}
