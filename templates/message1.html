{% extends 'base.html' %}

{% block title %}Reply{% endblock %}

{% block content %}
<style>
    .reply-input {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid var(--glass-border) !important;
        color: white !important;
        border-radius: 10px;
    }
</style>

<div class="container-fluid">
    <div class="mb-4">
        <h2 class="fw-bold m-0">Reply Mail</h2>
        <p class="text-white-50">Use voice commands: subject, body, send, clear, inbox.</p>
    </div>

    <div class="glass-card">
        <form method="post" id="replyForm">
            {% csrf_token %}
            <div class="mb-4">
                <label for="sendto" class="form-label text-info text-uppercase small fw-bold">To Email</label>
                <input type="email" id="sendto" name="sendto" value="{{ frm1 }}" class="form-control reply-input" required>
            </div>
            <div class="mb-4">
                <label for="subject" class="form-label text-info text-uppercase small fw-bold">Subject</label>
                <input type="text" id="subject" name="subject" class="form-control reply-input" required>
            </div>
            <div class="mb-4">
                <label for="content" class="form-label text-info text-uppercase small fw-bold">Reply Body</label>
                <textarea id="content" name="content" rows="10" class="form-control reply-input" required></textarea>
            </div>
            <div class="d-flex justify-content-end gap-3">
                <button type="reset" class="btn btn-outline-light">Clear</button>
                <button type="submit" class="btn btn-outline-info">Send Reply</button>
            </div>
        </form>
    </div>
</div>

<script>
    $(document).ready(function () {
        let activeField = $('#content');
        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition || null;
        if (!window.SpeechRecognition) return;

        const recognizer = new window.SpeechRecognition();
        recognizer.continuous = true;
        recognizer.interimResults = false;

        recognizer.onresult = function (event) {
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const spokenText = event.results[i][0].transcript;
                const command = $.trim(spokenText).toLowerCase();

                if (command === "to") {
                    activeField = $('#sendto');
                    speak("Please say recipient email.");
                } else if (command === "subject") {
                    activeField = $('#subject');
                    speak("Please say subject.");
                } else if (command === "body" || command === "reply") {
                    activeField = $('#content');
                    speak("Please say reply body.");
                } else if (command === "send") {
                    speak("Sending reply.");
                    $('#replyForm').submit();
                } else if (command === "clear") {
                    $('#replyForm')[0].reset();
                    speak("Reply form cleared.");
                } else if (command === "inbox") {
                    window.location.href = "{% url 'inbox' %}";
                } else {
                    activeField.val((activeField.val() + " " + spokenText).trim());
                }
            }
        };

        try { recognizer.start(); } catch (ex) { console.log(ex); }
    });
</script>
{% endblock %}

{% block speech_script %}
speak("Reply page loaded. Say subject, body, send, clear, or inbox.");
{% endblock %}
