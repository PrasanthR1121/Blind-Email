{% extends 'base.html' %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<style>
    .profile-input {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid var(--glass-border) !important;
        color: white !important;
        border-radius: 10px;
    }
</style>

<div class="container-fluid">
    <div class="mb-4">
        <h2 class="fw-bold m-0">Edit Profile</h2>
        <p class="text-white-50">Update your account details</p>
    </div>

    <div class="glass-card">
        <form method="post">
            {% csrf_token %}
            <div class="row g-4">
                <div class="col-md-6">
                    <label for="name" class="form-label text-info text-uppercase small fw-bold">Name</label>
                    <input type="text" id="name" name="name" value="{{ data.name }}" class="form-control profile-input" required>
                </div>
                <div class="col-md-6">
                    <label for="mobile" class="form-label text-info text-uppercase small fw-bold">Mobile</label>
                    <input type="text" id="mobile" name="mobile" value="{{ data.mobile }}" class="form-control profile-input" required>
                </div>
                <div class="col-md-6">
                    <label for="dob" class="form-label text-info text-uppercase small fw-bold">DOB</label>
                    <input type="date" id="dob" name="dob" value="{{ data.dob|date:'Y-m-d' }}" class="form-control profile-input" required>
                </div>
                <div class="col-md-6">
                    <label for="gender" class="form-label text-info text-uppercase small fw-bold">Gender</label>
                    <input type="text" id="gender" value="{{ data.gender }}" class="form-control profile-input" disabled>
                </div>
                <div class="col-12">
                    <label for="address" class="form-label text-info text-uppercase small fw-bold">Address</label>
                    <textarea id="address" name="address" rows="4" class="form-control profile-input" required>{{ data.address }}</textarea>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-3 mt-4">
                <a href="{% url 'profile' %}" class="btn btn-outline-light">Cancel</a>
                <button type="submit" class="btn btn-outline-info">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block speech_script %}
speak("Edit profile page loaded. Update your details and choose save changes.");
{% endblock %}
