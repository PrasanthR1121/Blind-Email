<!DOCTYPE html>
<html lang="en">
<head>
    <title>Blind Email</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    {% load static %}
    <link href="{% static 'web/css/style.css' %}" rel="stylesheet">
</head>

<body>

<!-- Background animation -->
<div class="bg-animation"></div>

<div class="container d-flex flex-column justify-content-center align-items-center min-vh-100 text-center position-relative">

    <!-- Hero Section -->
    <div class="glass-card p-5 shadow-lg">

        <h1 class="title mb-3">🔐 Blind Email</h1>

        <p class="subtitle mb-4">
            Secure. Private. Invisible.<br>
            Experience next-gen encrypted communication.
        </p>

        <!-- Buttons -->
        <div class="d-flex gap-3 justify-content-center">
            <a href="/reg/" class="btn btn-custom-outline">Register</a>
            <a href="/login/" class="btn btn-custom">Login</a>
        </div>

    </div>

    <!-- Footer -->
    <footer class="mt-5">
        <p class="small text-light">
            &copy; {% now "Y" %} Blind Email | Designed by Prasanth R
        </p>
    </footer>

</div>

</body>
</html>
