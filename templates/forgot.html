<!DOCTYPE html>
<html lang="en">

<head>
    <title>Forgot Password | Blind Email</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    {% load static %}
    <link href="{% static 'web/css/style.css' %}" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <script src="{% static 'web/js/forgot.js' %}"></script>

</head>

<body>

    <div class="hero-bg"></div>

    <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100 py-5">

        <div class="glass-card shadow-lg text-center">
]
            <h2 class="title mb-4" style="font-size: 2rem;">Reset Password</h2>

            <p class="subtitle mb-4" style="font-size: 0.95rem; opacity: 0.8;">
                Enter your registered details to recover your account access.
            </p>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3 text-start">
                    <input type="email" class="form-control" name="uname" placeholder="E-MAIL" required>
                </div>

                <div class="mb-4 text-start">
                    <input type="tel" class="form-control" name="mobile" placeholder="PHONE NUMBER" required>
                </div>

                <input type="submit" value="Verify Identity" class="btn btn-custom w-100 mb-4" name="submit">

                <div class="d-flex justify-content-between align-items-center mt-2 small">
                    <a href="/login/" class="text-info">Back to Login</a>
                    <a href="/reg/" class="text-info">Create Account</a>
                </div>
            </form>

            <div class="mt-5 pt-3 border-top border-secondary border-opacity-25">
                <p class="small"><a href="/blindemail/" class="opacity-50 text-light">Go back home</a></p>
            </div>

            {% if error %}
            <div class="alert alert-danger bg-transparent border-danger text-danger mt-3 py-2 small">
                {{error}}
            </div>
            {% endif %}
        </div>
    </div>

</body>

</html>
