{% extends 'base.html' %}

{% block title %}Edit Draft{% endblock %}

{% block content %}
<style>
    .draft-input {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid var(--glass-border) !important;
        color: white !important;
        border-radius: 10px;
    }
</style>

<div class="container-fluid">
    <div class="mb-4">
        <h2 class="fw-bold m-0">Edit Draft</h2>
        <p class="text-white-50">Review the saved message and send when ready</p>
    </div>

    <div class="glass-card">
        <form method="post" action="{% url 'draft2' %}" id="draftForm">
            {% csrf_token %}
            <div class="mb-4">
                <label for="sendto" class="form-label text-info text-uppercase small fw-bold">To Email</label>
                <input type="email" id="sendto" name="sendto" value="{{ frm1 }}" class="form-control draft-input" required>
            </div>
            <div class="mb-4">
                <label for="subject" class="form-label text-info text-uppercase small fw-bold">Subject</label>
                <input type="text" id="subject" name="subject" value="{{ sub }}" class="form-control draft-input" required>
            </div>
            <div class="mb-4">
                <label for="content" class="form-label text-info text-uppercase small fw-bold">Message Body</label>
                <textarea id="content" name="content" rows="10" class="form-control draft-input" required>{{ con }}</textarea>
            </div>
            <div class="d-flex justify-content-end gap-3">
                <a href="{% url 'draft' %}" class="btn btn-outline-light">Back</a>
                <button type="submit" class="btn btn-outline-info">Send Draft</button>
            </div>
        </form>
    </div>
</div>

<script>
    $(document).ready(function () {
        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition || null;
        if (window.SpeechRecognition) {
            const recognizer = new window.SpeechRecognition();
            recognizer.continuous = true;
            recognizer.interimResults = false;
            let activeField = $('#content');

            recognizer.onresult = function (event) {
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const spokenText = event.results[i][0].transcript;
                    const command = $.trim(spokenText).toLowerCase();

                    if (command === "to") {
                        activeField = $('#sendto');
                        speak("Please say recipient email.");
                    } else if (command === "subject") {
                        activeField = $('#subject');
                        speak("Please say subject.");
                    } else if (command === "body" || command === "message") {
                        activeField = $('#content');
                        speak("Please say message body.");
                    } else if (command === "send") {
                        speak("Sending draft.");
                        $('#draftForm').submit();
                    } else if (command === "back" || command === "drafts") {
                        window.location.href = "{% url 'draft' %}";
                    } else {
                        activeField.val((activeField.val() + " " + spokenText).trim());
                    }
                }
            };

            try { recognizer.start(); } catch (ex) { console.log(ex); }
        }
    });
</script>
{% endblock %}

{% block speech_script %}
speak("Edit draft loaded. Say to, subject, body, send, or back.");
{% endblock %}
