<!DOCTYPE html>
<html lang="en">

<head>
    <title>Security Question | Blind Email</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #0a0e1a;
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        .auth-card {
            width: min(440px, 92vw);
            padding: 34px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.14);
            color: white;
        }
    </style>
</head>

<body>
    <main class="auth-card">
        <h2 class="fw-bold mb-2">Security Check</h2>
        <p class="text-white-50">Answer your security question to continue.</p>
        <form method="post">
            {% csrf_token %}
            <label for="answer" class="form-label text-info text-uppercase small fw-bold">Favourite Colour</label>
            <input type="text" id="answer" name="answer" class="form-control form-control-lg mb-3" required autofocus>
            {% if error %}<p class="text-danger">{{ error }}</p>{% endif %}
            <button type="submit" class="btn btn-outline-info w-100">Submit</button>
        </form>
        <p class="mt-4 mb-0"><a href="{% url 'login' %}" class="text-info">Back to login</a></p>
    </main>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <script>
        window.addEventListener("load", function () {
            responsiveVoice.speak("Security question page. Please answer your favourite colour.", "UK English Female");
        });
    </script>
</body>

</html>
