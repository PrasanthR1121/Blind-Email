<!DOCTYPE html>
<html lang="en">

<head>
    <title>Login | Blind Email</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link href="{% static 'web/css/style.css' %}" rel="stylesheet">
    <script src="{% static 'web/js/login.js' %}"></script>
</head>

<body>

    <div class="hero-bg"></div>

    <div id="toast-container" class="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;">
    {% if messages %}
        {% for message in messages %}
        <div class="toast-card glass-card" style="margin-bottom: 10px; min-width: 300px; padding: 15px; background: rgba(10, 20, 45, 0.9); border-left: 5px solid {% if message.tags == 'error' %}#ff4d4d{% else %}#00d9ff{% endif %};">
            <div class="toast-content d-flex align-items-center gap-3">
                <div class="toast-body">
                    <div class="toast-title" style="font-weight:700; color:#00d9ff; font-size:0.7rem; text-transform:uppercase;">
                        {{ message.tags }}
                    </div>
                    <div class="toast-msg" style="color:white; font-size:0.85rem;">{{ message }}</div>
                </div>
                <button class="toast-close ms-auto" onclick="closeToast(this)" style="background:none; border:none; color:white; font-size:1.5rem;">&times;</button>
            </div>
        </div>
        {% endfor %}
    {% endif %}
</div>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="glass-card shadow-lg" style="width: 100%; max-width: 400px; padding: 40px; border-radius: 20px;">
        <h2 class="title text-center mb-4" style="color: #00d9ff; font-weight: 700;">Sign In Now</h2>
        
        <form method="POST" id="loginForm">
            {% csrf_token %}
            
            <div class="mb-3">
                <input type="text" class="form-control" name="uname" id="usernameField" 
                       placeholder="EMAIL OR USERNAME" required 
                       style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white;">
                <small id="emailError" class="text-danger" style="display:none; font-size: 0.75rem; margin-top: 5px;">
                    Please enter a valid email address.
                </small>
            </div>
            
            <div class="mb-3">
                <input type="password" class="form-control" name="password" placeholder="PASSWORD" required
                       style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white;"> 
            </div>
            
            <div class="d-flex justify-content-between mb-4 small">
                <label class="text-light opacity-75"><input type="checkbox"> Remember Me</label>
                <a href="/forgot/" class="text-info text-decoration-none">Forgot Password?</a>
            </div>

            <input type="submit" value="Sign In" class="btn btn-custom w-100 mb-3" name="login"
                   style="background: linear-gradient(45deg, #00d9ff, #9333ea); border: none; font-weight: 600;">
        </form>
        
        <div class="mt-4 text-center">
            <p class="small text-light opacity-75">Don't Have an Account? <a href="/reg/" class="text-info text-decoration-none fw-bold">Create one</a></p>
            <p class="small"><a href="/blindemail/" class="opacity-50 text-light text-decoration-none">Go back home</a></p>
        </div>
    </div>
</div>

</body>
