<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login | Blind Email</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link href="{% static 'web/css/style.css' %}" rel="stylesheet">
</head>
<body>

<div class="hero-bg"></div>

<div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    
    <div class="glass-card shadow-lg">
        <h2 class="title text-center mb-4" style="font-size: 2.2rem;">Sign In Now</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <input type="email" class="form-control mb-3" name="uname" placeholder="E-MAIL" required>
            <input type="password" class="form-control mb-3" name="password" placeholder="PASSWORD" required> 
            
            <div class="d-flex justify-content-between mb-4 small">
                <label><input type="checkbox"> Remember Me</label>
                <a href="/forgot/" class="text-info">Forgot Password?</a>
            </div>

            <input type="submit" value="Sign In" class="btn btn-custom w-100 mb-3" name="login">
        </form>
        
        <div class="mt-4">
            <p class="small">Don't Have an Account? <a href="/reg/" class="text-info">Create one</a></p>
            <p class="small"><a href="/commonhome/" class="opacity-50 text-light">Go back home</a></p>
        </div>

        {% if error %}
        <div class="text-danger small mt-2">{{error}}</div>
        {% endif %}
    </div>
</div>

</body>
</html>
