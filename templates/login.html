{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <title>Login | Blind Email</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'web/css/style.css' %}" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <script src="{% static 'web/js/login.js' %}"></script>
</head>

<body>
    <div class="hero-bg"></div>

    <div class="toast-container">
        {% if messages %}
        {% for message in messages %}
        <div class="toast-card glass-card p-3" id="toast-{{ forloop.counter }}">
            <div class="d-flex justify-content-between align-items-start">
                <div class="toast-body">
                    <div class="toast-title text-info fw-bold small text-uppercase">{{ message.tags }}</div>
                    <div class="toast-msg text-white django-msg">{{ message }}</div>
                </div>
                <button class="btn-close btn-close-white" onclick="$(this).closest('.toast-card').remove()"></button>
            </div>
            <div class="toast-progress"></div>
        </div>
        {% endfor %}
        {% endif %}
    </div>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="glass-card p-5" style="max-width: 420px; width: 100%;">
            <h2 class="text-center mb-4 fw-bold" style="color: var(--neon-blue);">SIGN IN</h2>
            <form method="POST">
                {% csrf_token %}
                <input type="text" class="form-control text-black mb-3" name="uname" placeholder="EMAIL OR USERNAME"
                    required autofocus>

                <input type="password" class="form-control text-black mb-4" name="password" placeholder="PASSWORD"
                    required>

                <button type="submit" class="btn btn-custom w-100 fw-bold">SIGN IN</button>
            </form>

            <div class="mt-4 text-center">
                <p class="small">Don't have an account? <a href="/reg/" class="text-info">Register</a></p>
                <p class="small"><a href="/blindemail/" class="opacity-50 text-light">Go back home</a></p>
            </div>
        </div>
    </div>
</body>

</html>
