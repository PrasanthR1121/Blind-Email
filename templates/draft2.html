{% extends 'base.html' %}

{% block title %}Send Draft{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="mb-4">
        <h2 class="fw-bold m-0">Send Draft</h2>
        <p class="text-white-50">Confirm the draft details before sending</p>
    </div>

    <div class="glass-card">
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="sendto" class="form-label text-info text-uppercase small fw-bold">To Email</label>
                <input type="email" id="sendto" name="sendto" value="{{ frm1 }}" class="form-control" required>
            </div>
            <div class="mb-4">
                <label for="subject" class="form-label text-info text-uppercase small fw-bold">Subject</label>
                <input type="text" id="subject" name="subject" value="{{ sub }}" class="form-control" required>
            </div>
            <div class="mb-4">
                <label for="content" class="form-label text-info text-uppercase small fw-bold">Message Body</label>
                <textarea id="content" name="content" rows="10" class="form-control" required>{{ con }}</textarea>
            </div>
            <div class="d-flex justify-content-end gap-3">
                <a href="{% url 'draft' %}" class="btn btn-outline-light">Back</a>
                <button type="submit" class="btn btn-outline-info">Send Draft</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block speech_script %}
speak("Send draft page loaded. Confirm details and choose send draft.");
{% endblock %}
